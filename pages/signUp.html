<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign Up - Sticky Notes</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="../style/signup.css">
</head>

<body>

  <div class="signup-card">
    <h2>Create Account</h2>

    <form>
      <div class="mb-3">
        <input type="text" id="userName" class="form-control" placeholder="Full Name">
      </div>

      <div class="mb-3">
        <input type="email" id="userEmail" class="form-control" placeholder="Email Address">
      </div>

      <div class="mb-3">
        <input type="password" id="userPassword" class="form-control" placeholder="Password">
      </div>

      <div class="mb-3">
        <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm Password">
      </div>

      <div class="d-grid">
        <button class="btn btn-custom">Sign Up</button>
      </div>

      <div class="login-link">
        <p>Already have an account? <a href="../index.html">Login</a></p>
      </div>
    </form>
  </div>

  <script src="../script/app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
