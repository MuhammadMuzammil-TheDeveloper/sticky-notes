<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Sticky Notes</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="./style/style.css">
</head>

<body>

  <div class="login-card">
    <h2>Login</h2>

   
      <div class="mb-3">
        <input type="email" id="loginUserEmail" class="form-control" placeholder="Enter Email">
      </div>

      <div class="mb-3">
        <input type="password" id="loginUserPassword" class="form-control" placeholder="Enter Password">
      </div>

      <div class="d-grid">
        <button class="btn btn-custom" id="loginBtn">Login</button>
      </div>

      <div class="signup-link">
        <p>Don't have an account? <a href="./pages/signUp.html">Sign Up</a></p>
      </div>
 
  </div>

    <script src="./script/app.js"></script>  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
